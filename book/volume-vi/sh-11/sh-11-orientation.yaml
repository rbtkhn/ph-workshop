source_id: sh-11
placement_weight: medium
where_this_sits: This Secret History unit supplies a pre-Homeric imagination root for the literary spine: ritual, care, cave art, and story become the conditions that make later epic and scriptural memory intelligible.
reading_posture: Read this as a support node for the literary arc, not as a complete theory of prehistory. Its value is in showing why imagination, empathy, and symbolic life matter before named authors appear.
historical_pressure_points:
  - Darwinian selection and its misuse in social theory
  - Cave art, ritual, shamanic imagination, and early symbolic practice
  - Care, disability, dependency, and empathy as civilizational facts
  - Milton, Beethoven, and later creators as echoes of older imaginative capacities
limits_of_the_frame: This entry is in review and treats prehistoric, evolutionary, disability, race, and religious claims as lecture interpretations pending external scholarly review.
return_path: Return from this card to the transcript for the lecture's movement from Darwin and cave art into human care, imagination, and later literary creativity.

