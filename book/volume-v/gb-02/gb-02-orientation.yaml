source_id: gb-02
placement_weight: strong
where_this_sits: This lecture moves from the course frame into Homer as the invention of a human world in which heroic action, mortality, speech, and memory become readable as literature.
reading_posture: Read it as a literary-origin chapter that turns the canon from an abstract promise into a concrete encounter with Homeric humanity.
historical_pressure_points:
  - Homer becomes the first major test of what great books can preserve about human action and self-understanding.
  - The lecture connects epic poetry to memory, heroism, mortality, and the formation of the human interior.
  - It sets up later Homeric returns through the Odyssey, Virgil, Dante, and anti-Homeric reversals.
limits_of_the_frame: This entry is in review. Claims about Homer inventing the human, oral culture, Greek priority, and literary origin should remain lecture interpretations pending external literary and historical review.
return_path: Return here when studying Homer, epic memory, the Iliad/Odyssey sequence, literary anthropology, or the course's claim that texts can disclose what humans are.
