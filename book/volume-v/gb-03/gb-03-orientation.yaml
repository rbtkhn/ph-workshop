source_id: gb-03
placement_weight: strong
where_this_sits: This lecture places poets and prophets together as rival and overlapping voices that disclose worlds, found communities, and give language to invisible or sacred experience.
reading_posture: Read it as a comparison of literary and prophetic imagination, with the emphasis on how language creates public meaning.
historical_pressure_points:
  - Poetry and prophecy are treated as forms of world-making rather than private expression alone.
  - The chapter links sacred speech, literary vision, authority, and communal memory.
  - It helps bridge Great Books reading with the religious and civilizational arcs already present elsewhere in the corpus.
limits_of_the_frame: This entry is in review. Claims about prophets, sacred authority, religious transmission, and poetic world-making need source-layer distinction and interfaith caution.
return_path: Return here when comparing literary imagination with religious formation, prophetic speech, canon formation, or later Dante and biblical-material chapters.
