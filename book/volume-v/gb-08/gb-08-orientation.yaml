source_id: gb-08
placement_weight: strong
where_this_sits: This lecture places Virgil and empire inside the Great Books sequence, making poetry a vehicle for imperial memory, legitimacy, grief, and Roman inheritance.
reading_posture: Read it as a strong literary-civilizational hinge between Homeric epic and the political imagination of empire.
historical_pressure_points:
  - Poetry becomes a way empire remembers itself and justifies its losses.
  - Virgil likely mediates Greek inheritance into Roman identity and imperial destiny.
  - The lecture prepares the later Dante turn by showing how poetry can carry political theology.
limits_of_the_frame: This entry is in review. Claims about Virgil, empire, Roman identity, propaganda, grief, and political theology need close textual and historical review.
return_path: Return here when studying Virgil, Rome, empire, poetic legitimacy, Aeneid inheritance, or the path from Homeric memory to Dante's reworking of empire and love.
