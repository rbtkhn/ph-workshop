source_id: gb-01
placement_weight: strong
where_this_sits: This opening Great Books lecture establishes the course frame: reading canonical works as a way to recover full humanity, consciousness, love, imagination, and freedom from modern attention capture.
reading_posture: Read it as a threshold lecture and classroom provocation, not as a settled science or theology statement.
historical_pressure_points:
  - Canon reading is framed as an entrance into human interiority rather than mere content coverage.
  - Kant, Plato, meditation, AI, media, school, and religious language are braided into one orientation problem.
  - The lecture asks students to treat attention, imagination, and love as stakes of education.
limits_of_the_frame: This entry is in review. Consciousness, neuroscience, psychedelics, Christian language, school critique, and science-vs-spirituality claims require careful source-layering and later external review.
return_path: Return here when entering the Great Books series, comparing canon pedagogy to Civilization's imagination arc, or tracing the course's opening claims about attention, love, and consciousness.
