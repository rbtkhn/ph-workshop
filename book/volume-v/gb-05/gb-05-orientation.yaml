where_this_sits: This lecture makes the Odyssey a central test of the Great Books project: return, wandering, desire, home, storytelling, and human identity become the problem of reading itself.
reading_posture: Read it as a major literary hinge, especially for re-entry into Homer, homecoming, love, temptation, and self-recognition.
historical_pressure_points:
