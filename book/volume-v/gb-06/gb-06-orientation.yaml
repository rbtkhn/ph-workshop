  - The chapter likely links intimacy, attention, vulnerability, and the possibility of knowing another person.
  - Its placement is medium because its civilizational role depends on later textual anchoring.
limits_of_the_frame: This entry is in review. Claims about love, intimacy, sexuality, psychology, and personhood should stay bounded until the commentary receives closer textual review.
return_path: Return here when comparing love across Homer, Dante, religious imagination, psychology, and the course's recurring claim that attention forms the human being.
