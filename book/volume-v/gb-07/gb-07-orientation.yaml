where_this_sits: This lecture names an anti-Homeric turn, using opposition to Homer as a way to test the canon's internal argument about heroism, violence, imitation, and moral imagination.
reading_posture: Read it as a strong comparative hinge: the point is not only a text, but a reversal of the heroic pattern established earlier.
historical_pressure_points:
  - The chapter depends on earlier Homeric placement and asks what it means to oppose or revise Homer.
  - It likely tracks anti-heroic, philosophical, or moral critique within the canon itself.
  - It prepares the reader for Virgil, Dante, and later reworkings of epic inheritance.
limits_of_the_frame: This entry is in review. Anti-Homer framing, canon rivalry, moral critique, and implied textual hierarchy require later close reading and external literary review.
return_path: Return here when studying canon conflict, anti-epic movements, critique of heroism, Plato/Homer tension, or the path from Homer to Virgil and Dante.
