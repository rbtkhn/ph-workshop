source_id: civ-01
placement_weight: strong
where_this_sits: "This chapter opens the Civilization sequence at a true threshold: the movement from hunter-gatherer life toward sedentary communities and agriculture. Its larger importance is not simply farming, but the way ritual aggregation, ancestor worship, resource pressure, and social cohesion begin to reshape human life before full agricultural civilization is secure."
reading_posture: "Read this as an origin chapter for civilizational formation. The lecture challenges the simple progress story in which farming naturally creates surplus and modernity, and instead asks why people would accept a harder, more constrained way of life."
historical_pressure_points:
  - "Ritual centers can gather people before permanent settlement fully stabilizes."
  - "Sedentism changes the meaning of resources, ancestors, and shared space."
  - "Religious life appears as a possible engine of cohesion, not only a later cultural decoration."
  - "Resource pressure helps explain why settled life can move toward farming even when foraging remains attractive."
limits_of_the_frame: "The chapter is still an archaeological and interpretive lecture. Its strong placement weight comes from the subject matter, but the reader should keep the lecture's own caution in view: several explanations are considered, and the religious account remains a working interpretation rather than a closed proof."
return_path: "Return to this entry when later chapters ask how civilization begins, why settlement becomes durable, or how symbolic life can shape material institutions. For close reading, use the source transcript and then the companion commentary."
