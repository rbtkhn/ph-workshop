source_id: geo-05
placement_weight: light
where_this_sits: "This chapter belongs to the Geo-Strategy sequence as an electoral forecast tied to imperial incentives. Its wider frame is late-imperial American politics: coalition erosion, suburban legitimacy, elite signaling, and the possibility that domestic political strategy can feed foreign-policy escalation."
reading_posture: "Read this as a light placement case. The main value is not a broad civilizational map, but a test of predictive method: how the lecture builds a model from electoral blocs, candidate incentives, donor networks, and the expected path toward conflict with Iran."
historical_pressure_points:
  - "Coalition politics can reveal weakening legitimacy before formal institutions break."
  - "Suburban voters are treated as a hinge between elite stability and populist disruption."
  - "Foreign-policy alignment is read through donors, personnel choices, and campaign strategy."
  - "Forecasts become useful when they can later be tested and revised."
limits_of_the_frame: "This unit is mostly near-term electoral analysis. Its placement weight should stay light because it does not, by itself, explain a whole civilizational formation. The reader should treat its claims as model-building and prediction, not settled historical judgment."
return_path: "Return to this entry when comparing forecasts across Geo-Strategy, especially chapters about Iran, American empire, and domestic polarization. For verification, start with the transcript and use the commentary only as a companion guide."
