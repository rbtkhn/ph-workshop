# Pre-publication export manifest for the rbtkhn/ph-civ public edition and context pack.
#
# This manifest names candidate batches only. It does not approve export.
# Route-level public_export_status in registries/ph-choreography.yaml remains
# the authority for whether a route may be copied into rbtkhn/ph-civ.

release:
  target_repo: rbtkhn/ph-civ
  source_repo: rbtkhn/ph-workshop
  release_stage: pre_publication_scaffold
  public_population: paused
  approval_authority: route_public_export_status

batches:
  - batch_id: pilot-001
    status: pre_publication_scaffold
    purpose: "First public-shape rehearsal around the current eight routed museum calibration entries."
    route_ids:
      - civ-07
      - civ-29
      - civ-51
      - gb-02
      - gb-09
      - geo-14
      - gt-16
      - sh-28
    export_rule: "Batch membership does not approve export; every route must pass the publication gate independently."
