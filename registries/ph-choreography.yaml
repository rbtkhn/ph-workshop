# Predictive History public-surface choreography registry.
#
# This registry maps the first public museum calibration exhibits across:
# - ph-civ: Civilization-facing pattern formation
# - ph-apo: Apocalypse-facing pressure application
# - ph-mus: museum exhibit encounter
#
# It is intentionally partial. Missing chapters do not fail validation until
# they claim a museum exhibit.
#
# public_export_status gates whether a route may be copied into rbtkhn/ph-civ.
# curated_draft museum work is not the same thing as public export approval.

routes:
  - source_id: civ-07
    surface: ph-civ
    museum_status: curated_draft
    public_export_status: candidate
    claim_boundaries:
      - orientation
      - interpretive
      - historical_claim
      - rights_sensitive
      - artifact_manifest
    readiness_note: "Candidate review has started for a public ph-civ bridge rehearsal; export remains blocked until final public-facing review, rights boundary, and package contract approval."
    card_path: corpus/civ-ph/civ-07.md
    transcript_path: book/volume-ii/civ-07/civ-07-transcript.md
    commentary_path: book/volume-ii/civ-07/civ-07-commentary.md
    museum_exhibit_path: corpus/media-packs/civ-07.md
    museum_payload_path: book/volume-ii/civ-07/civ-07-media.yaml
    what_changes_here: "Homer becomes a civilizational memory system: heroic action is no longer just story, but a grammar of honor, violence, and inherited imagination."

