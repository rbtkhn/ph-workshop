version: 1

corridors:
  - corridor: homer-to-dante
    title: "Homer to Dante"
    status: in_review
    reader_path: corpus/cross-volume/homer-to-dante.md
    description: "A guided cross-volume route from Homeric Greek memory through Virgilian empire into Dante's poetic reordering of European imagination."
  - corridor: homer-to-tolstoy
    title: "Homer to Tolstoy"
    status: in_review
    reader_path: corpus/cross-volume/homer-to-tolstoy.md
    structural_role: volume_i_literary_spine
    routing_role: cross_volume_exposure
    terminal_author: Tolstoy
    terminal_status: routed_via_secret_history_subset
    description: "The Volume I literary spine from Homer, Virgil, and Dante through Shakespeare and Dostoevsky, exposed through cross-volume routing with Tolstoy routed through the limited Secret History literary subset."
  - corridor: tolstoy-question
    title: "The Tolstoy Question"
    status: routed_draft
    reader_path: corpus/cross-volume/tolstoy-question.md
    description: "A causation corridor that asks whether visible actors make history or become legible through deeper pressure systems."

edges:
  - from: civ-07
    to: gb-02
    relation_type: scale_shift
    corridor: homer-to-dante
    theme: "Homeric humanity"
    claim: "Civilization places Homer inside Greek civilizational memory; Great Books shifts the scale to Homer as a disclosure of readable human action."
    strength: strong
    guardrail: "Treat this as a shift in reading scale, not as proof that Homer alone caused Greek civilization."

  - from: gb-02
    to: gb-05
    relation_type: inheritance
    corridor: homer-to-dante
    theme: "From heroic action to return"
    claim: "The Homeric human introduced through heroic action is extended through wandering, homecoming, desire, and self-recognition."
    strength: strong
    guardrail: "Keep Iliad and Odyssey questions distinct; do not flatten Homer into one moral or psychological thesis."

  - from: gb-05
    to: gb-07
    relation_type: revision
    corridor: homer-to-dante
    theme: "Anti-Homeric critique"
    claim: "The Great Books sequence turns from Homeric return toward a deliberate test or reversal of heroic inheritance."
    strength: medium
    guardrail: "Read anti-Homeric revision as an interpretive relation that requires close textual checking, not as simple rejection."

  - from: gb-07
    to: civ-17
    relation_type: transmutation
    corridor: homer-to-dante
    theme: "Greek epic into Roman memory"
    claim: "Anti-Homeric pressure prepares the move into Virgil, where Greek epic inheritance becomes Roman imperial memory."
    strength: strong
    guardrail: "Keep literary transformation separate from a complete explanation of Roman political development."

  - from: civ-17
    to: gb-08
    relation_type: scale_shift
    corridor: homer-to-dante
    theme: "Virgil and empire"
    claim: "Civilization frames Virgil as Rome's poetic self-understanding; Great Books shifts toward close reading of poetry as imperial memory."
    strength: strong
    guardrail: "Treat Virgilian empire as a literary-political frame, not as a settled judgment on the whole Aeneid."

  - from: gb-08
    to: civ-29
    relation_type: transmutation
    corridor: homer-to-dante
    theme: "Empire into pilgrimage"
    claim: "Virgilian imperial memory becomes the inherited material Dante must honor, revise, and surpass inside Christian pilgrimage."
    strength: strong
    guardrail: "Keep Dante's theological and poetic transformation distinct from a simple anti-Roman or anti-Virgil claim."

  - from: civ-29
    to: civ-30
    relation_type: inheritance
    corridor: homer-to-dante
    theme: "Dante capstone"
    claim: "The first Dante chapter opens the liberation of imagination; the second extends that claim into Dante's replacement of older epic authority."
    strength: strong
    guardrail: "Preserve the difference between Dante as poetic capstone and Dante as long-range historical cause."

  - from: civ-30
    to: civ-41
    relation_type: return
    corridor: homer-to-dante
    theme: "Dante's historical afterlife"
    claim: "The Dante capstone returns later as a Renaissance hinge for imagination, individuality, and peaceful cultural transformation."
    strength: medium
    guardrail: "Treat Dante-to-Renaissance causation as a lecture thesis requiring external review."

  - from: civ-41
    to: gb-09
    relation_type: return
    corridor: homer-to-dante
    theme: "Close reading after civilizational synthesis"
    claim: "After Dante is framed as a civilizational hinge, Great Books returns to Dante as a close-reading problem of love, ascent, and poetic architecture."
    strength: strong
    guardrail: "Use the return to deepen reading, not to collapse Civilization and Great Books into one interpretive surface."

  - from: gb-09
    to: gb-10
    relation_type: inheritance
    corridor: homer-to-dante
    theme: "Dante's Inferno deepening"
    claim: "After Great Books re-enters Dante through the Divine Comedy, the next Dante unit deepens the route into Inferno's hierarchy of hell, sin, punishment, love, and self-forgiveness."
    strength: strong
    guardrail: "Treat this as a Dante-sequence deepening, not as a final theological account of Inferno."

  - from: gb-10
    to: civ-51
    relation_type: transmutation
    corridor: homer-to-tolstoy
    theme: "Dante into Shakespeare"
    claim: "After Dante gathers epic inheritance into love, ascent, hell, and poetic architecture, Shakespeare shifts literary power toward language, theater, psychology, and imperial culture."
    strength: strong
    guardrail: "Treat the move from Dante to Shakespeare as an author-arc transition, not as proof that Shakespeare directly inherits Dante in a simple causal line."

  - from: civ-51
    to: civ-53
    relation_type: transmutation
    corridor: homer-to-tolstoy
    theme: "Shakespeare into Dostoevsky"
    claim: "The literary arc moves from Shakespeare's language of empire into Dostoevsky's novelistic pressure on conscience, suffering, faith, and the modern soul."
    strength: strong
    guardrail: "Do not turn Shakespeare or Dostoevsky into complete explanations for British, Russian, or modern civilization; keep them as literary carriers inside larger historical frames."

  - from: civ-53
    to: sh-16
    relation_type: return
    corridor: homer-to-tolstoy
    theme: "Dostoevsky into Tolstoy"
    claim: "The literary arc can now reach Tolstoy through SH-16's Anna Karenina coda, which returns from Greek epic memory to the modern novel's spiritual and psychological fracture."
    strength: medium
    guardrail: "SH-16 is source-backed but not a dedicated Tolstoy lecture; treat Tolstoy here as a routed terminal coda, not as complete Tolstoy coverage."

  - from: civ-07
    to: gb-02
    relation_type: causation_question
    corridor: tolstoy-question
    theme: "Heroic agency and civilizational memory"
    claim: "The causation question begins where heroic agency becomes civilizational memory and can be tested through close reading of Homer."
    strength: strong
    guardrail: "Do not treat Homeric heroic agency as a simple historical theory of causation."

  - from: gb-02
    to: gb-05
    relation_type: actor_to_pressure
    corridor: tolstoy-question
    theme: "From Achilles to Odysseus"
    claim: "The question shifts from glory and rage toward adaptive intelligence, return, and constrained action."
    strength: strong
    guardrail: "Keep Achilles and Odysseus as distinct literary problems rather than one model of agency."

  - from: gb-05
    to: civ-15
    relation_type: actor_to_pressure
    corridor: tolstoy-question
    theme: "From epic actor to political author"
    claim: "The route moves from literary agency into Caesar's self-authored political centrality under late-republic pressure."
    strength: medium
    guardrail: "Treat this as a study path, not a direct Homer-to-Caesar causal inheritance."

  - from: civ-15
    to: civ-16
    relation_type: myth_to_system
    corridor: tolstoy-question
    theme: "Personal myth into regime form"
    claim: "Caesar's personal myth becomes material that Octavian converts into a durable imperial settlement."
    strength: strong
    guardrail: "Keep Caesar's self-narration and Octavian's institutional conversion analytically distinct."

  - from: civ-16
    to: civ-25
    relation_type: myth_to_system
    corridor: tolstoy-question
    theme: "Imperial form and portable religion"
    claim: "Roman institutional scale prepares the question of how Paul becomes a hinge for portable religious transmission."
    strength: medium
    guardrail: "Do not collapse Roman infrastructure into a complete explanation of Christian formation."

  - from: civ-25
    to: civ-48
    relation_type: myth_to_system
    corridor: tolstoy-question
    theme: "Transmission and revolutionary myth"
    claim: "The route moves from religious transmission into the modern problem of revolutionary energy gathered into a named actor."
    strength: medium
    guardrail: "Use this as a causation comparison, not as a claim that Paul and Napoleon perform the same historical role."

  - from: civ-48
    to: civ-53
    relation_type: necessity
    corridor: tolstoy-question
    theme: "Napoleon and inner necessity"
    claim: "After Napoleon, the question turns inward through Dostoevsky, where history is read through conscience, suffering, and spiritual compulsion."
    strength: strong
    guardrail: "Do not treat Dostoevsky as a complete explanation of Russian political history."

  - from: civ-53
    to: sh-16
    relation_type: return
    corridor: tolstoy-question
    theme: "Dostoevsky into Tolstoy"
    claim: "The route reaches Tolstoy as the explicit challenge to great-man history and the literary return to distributed causation."
    strength: medium
    guardrail: "SH-16 is a routed endpoint, not a full Tolstoy lecture."

  - from: sh-16
    to: civ-59
    relation_type: necessity
    corridor: tolstoy-question
    theme: "Tolstoy's challenge under system terror"
    claim: "Stalin forces the Tolstoy question into the twentieth century: actor, system, terror, ideology, and war mobilization cannot be separated cleanly."
    strength: strong
    guardrail: "Do not use system pressure to excuse or soften moral responsibility for terror."

  - from: civ-59
    to: gt-21
    relation_type: actor_to_pressure
    corridor: tolstoy-question
    theme: "From historical actor to live strategic pressure"
    claim: "The route moves from Stalin as historical actor-system problem into live game-theoretic pressure among named leaders and theaters."
    strength: strong
    guardrail: "Treat current-event and forecast-bearing claims as date-sensitive and in-review."

  - from: gt-21
    to: gt-22
    relation_type: necessity
    corridor: tolstoy-question
    theme: "Actor-system pressure into state-form constraint"
    claim: "The endpoint asks whether the actor under pressure is now the nation-state form itself rather than any single leader."
    strength: strong
    guardrail: "Keep structural diagnosis separate from deterministic collapse claims."
